<script>
// ===== Data Loading =====
function _applyLocalOwner(data) {
  // If user logged in via password (API key cached), force isOwner true
  if (!data.isOwner && localStorage.getItem('traveller_apikey')) {
    data.isOwner = true;
  }
  return data;
}

function loadData() {
  google.script.run
    .withSuccessHandler(function(data) {
      try {
        _applyLocalOwner(data);
        appData = data;
        saveToCache(data);
        localStorage.setItem('traveller_sync', new Date().toLocaleString());
        renderApp();
      } catch(e) {
        document.getElementById('daysContent').innerHTML = '<pre style="color:red;padding:12px;">' + e.message + '\n' + e.stack + '</pre>';
        document.getElementById('tabItinerary').style.display = '';
        document.getElementById('skeleton').style.display = 'none';
      }
    })
    .withFailureHandler(function(err) {
      failToast(err);
      if (appData) renderApp();
    })
    .getAppData();
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  google.script.run
    .withSuccessHandler(function(data) {
      btn.classList.remove('spinning');
      _applyLocalOwner(data);
      appData = data;
      saveToCache(data);
      localStorage.setItem('traveller_sync', new Date().toLocaleString());
      renderApp();
      showToast('Updated', 'success');
    })
    .withFailureHandler(function(err) {
      btn.classList.remove('spinning');
      failToast(null, 'update');
    })
    .getAppData();
}

// ===== Cache =====
function saveToCache(data) {
  try { localStorage.setItem('traveller_data', JSON.stringify(data)); } catch(e) {}
}
function saveActiveTab(tab) {
  try { localStorage.setItem('traveller_tab', tab); } catch(e) {}
}
function loadActiveTab() {
  try { return localStorage.getItem('traveller_tab') || ''; } catch(e) { return ''; }
}
function saveSelectedTrip(trip) {
  try { localStorage.setItem('traveller_trip', trip); } catch(e) {}
}
function loadSelectedTrip() {
  try { return localStorage.getItem('traveller_trip') || ''; } catch(e) { return ''; }
}
function loadFromCache() {
  try {
    var c = localStorage.getItem('traveller_data');
    if (c) { appData = JSON.parse(c); _applyLocalOwner(appData); }
  } catch(e) {}
}

// ===== Tabs =====
function switchTab(tab, fromHash) {
  activeTab = tab;
  saveActiveTab(tab);
  document.querySelectorAll('.tab-content').forEach(function(el) { el.style.display = 'none'; });
  document.querySelectorAll('.bottom-tab').forEach(function(el) { el.classList.remove('active'); });

  // Check if tab is private for non-owners
  var settings = (appData && appData.settings) || {};
  var privateTabs = (settings['app.private'] || '').split(',').filter(Boolean);
  var isTabPrivate = !isOwner && privateTabs.indexOf(tab) >= 0;

  var tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (tabEl) {
    tabEl.style.display = '';
    // Show lock screen for private tabs (non-owner)
    var lockId = tab + 'Lock';
    var lockEl = document.getElementById(lockId);
    if (isTabPrivate && !lockEl) {
      // Create inline lock screen
      tabEl.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">' +
        '<span class="material-icons-round" style="font-size:48px;">lock</span>' +
        '<div style="margin-top:12px;font-size:15px;font-weight:500;">Private Zone</div></div>';
    }
  }

  var btns = document.querySelectorAll('.bottom-tab');
  var tabIdx = { overview: 0, trip: 1, itinerary: 2, map: 3, expenses: 4 };
  if (btns[tabIdx[tab]]) btns[tabIdx[tab]].classList.add('active');

  // Map tab: remove padding from main
  var mainEl = document.querySelector('.main');
  if (mainEl) { if (tab === 'map') mainEl.classList.add('map-active'); else mainEl.classList.remove('map-active'); }

  // Day nav only in itinerary tab, overview nav only in overview tab
  document.getElementById('dayNav').style.display = (tab === 'itinerary' && currentPlans.length > 0) ? '' : 'none';
  document.getElementById('overviewNav').style.display = (tab === 'overview') ? '' : 'none';
  // Restore overview sub-section
  if (tab === 'overview' && typeof switchOverviewSection === 'function') {
    var cachedOvSection = '';
    try { cachedOvSection = localStorage.getItem('traveller_ov_section') || ''; } catch(e) {}
    switchOverviewSection(cachedOvSection || _overviewSection || 'dashboard', true);
  }

  // Header add button — show on tabs that support adding (owner only)
  var addBtn = document.getElementById('headerAddBtn');
  var showAdd = isOwner && (tab === 'trip' || tab === 'itinerary' || tab === 'expenses' || (tab === 'overview' && (_overviewSection === 'checklist' || _overviewSection === 'postcard')));
  if (addBtn) addBtn.style.display = showAdd ? '' : 'none';


  // Update URL hash for back button / refresh
  if (!fromHash && location.hash !== '#' + tab) {
    history.pushState(null, '', '#' + tab);
  }

  scrollToTop();

  // Auto-scroll to today when switching to itinerary
  if (tab === 'itinerary' && typeof _itinTodayIdx !== 'undefined' && _itinTodayIdx >= 0) {
    setTimeout(function() { scrollToDay(_itinTodayIdx); }, 300);
  }
}

// ===== Render =====
function renderApp() {
  if (!appData || !appData.trips || appData.trips.length === 0) return;

  document.getElementById('skeleton').style.display = 'none';

  // Find selected trip — from cache, then ongoing trip, then most recent
  if (!selectedTrip) {
    var cached = loadSelectedTrip();
    if (cached && appData.trips.some(function(t) { return t.trip === cached; })) {
      selectedTrip = cached;
    } else {
      // Prefer ongoing trip (today within start-end)
      var today = new Date().toISOString().slice(0, 10);
      var ongoing = appData.trips.find(function(t) {
        return t.start && t.end && today >= t.start && today <= t.end;
      });
      if (ongoing) {
        selectedTrip = ongoing.trip;
      } else {
        var sorted = appData.trips.slice().sort(function(a, b) {
          return (b.start || '').localeCompare(a.start || '');
        });
        selectedTrip = sorted[0].trip;
      }
    }
  }
  currentTrip = appData.trips.find(function(t) { return t.trip === selectedTrip; });
  if (!currentTrip) { currentTrip = appData.trips[0]; selectedTrip = currentTrip.trip; }

  currency = (currentTrip.currency || '').slice(-1);
  currentPlans = appData.plans.filter(function(p) { return p.trip === selectedTrip; });

  // Update header trip name
  document.getElementById('headerTripName').textContent = currentTrip.trip;

  // Owner access control
  isOwner = appData.isOwner;
  document.body.classList.toggle('read-only', !isOwner);

  renderTripTab();
  renderItineraryTab();
  renderExpensesTab();
  renderChecklistTab();
  renderPostcardTab();
  renderOverviewTab();
  renderMapTab();
  renderSettingsTab();

  // Map old hashes
  if (activeTab === 'checklist' || activeTab === 'extras') activeTab = 'overview';

  // Restore tab: hash > cache > home setting > default
  var settings = appData.settings || {};
  if (!activeTab) {
    var cachedTab = loadActiveTab();
    if (cachedTab && cachedTab !== 'settings') {
      activeTab = cachedTab;
    } else {
      activeTab = settings['app.home'] || 'overview';
    }
  }

  switchTab(activeTab);
}

// ===== Day Nav =====
function scrollToDay(idx) {
  var el = document.getElementById('day' + idx);
  if (!el) return;
  try {
    var rect = el.getBoundingClientRect();
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    var navH = document.getElementById('dayNav') ? document.getElementById('dayNav').offsetHeight : 0;
    var headerH = 56;
    var top = rect.top + scrollTop - headerH - navH - 8;
    if (document.documentElement.scrollTo) document.documentElement.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    document.body.scrollTop = Math.max(0, top);
    window.scrollTo(0, Math.max(0, top));
  } catch(e) { el.scrollIntoView(true); }
  highlightDayNav(idx);
}

function highlightDayNav(idx) {
  document.querySelectorAll('#dayNav .sub-nav-item').forEach(function(btn, i) { btn.classList.toggle('active', i === idx); });
  var btn = document.getElementById('dayNavBtn' + idx);
  if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

var dayObserver = null;
function setupDayObserver() {
  if (dayObserver) dayObserver.disconnect();
  dayObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var idx = parseInt(entry.target.id.replace('day', ''));
        highlightDayNav(idx);
      }
    });
  }, { rootMargin: '-100px 0px -60% 0px' });
  document.querySelectorAll('.day-section').forEach(function(el) { dayObserver.observe(el); });
}

var renderObserverTimer = null;
var origRender = renderApp;
renderApp = function() {
  origRender();
  clearTimeout(renderObserverTimer);
  renderObserverTimer = setTimeout(setupDayObserver, 100);
};

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

function goHome() {
  var settings = (appData && appData.settings) || {};
  var homeTab = settings['app.home'] || 'overview';
  switchTab(homeTab);
  scrollToTop();
}

function onHeaderAdd() {
  if (activeTab === 'trip') openAddTripForm();
  else if (activeTab === 'itinerary') openItinForm();
  else if (activeTab === 'expenses') openExpForm();
  else if (activeTab === 'overview') {
    if (_overviewSection === 'checklist') openCheckForm();
    else if (_overviewSection === 'postcard') openPostcardForm();
  }
}

// ===== Boot =====
loadFromCache();
document.addEventListener('DOMContentLoaded', function() { loadData(); });

window.addEventListener('hashchange', function() {
  var hash = (location.hash || '').replace('#', '');
  if (hash === 'checklist' || hash === 'extras') hash = 'overview';
  // Handle overview sub-sections
  if (hash.indexOf('overview-') === 0) {
    var section = hash.replace('overview-', '');
    if (activeTab !== 'overview') switchTab('overview', true);
    if (typeof switchOverviewSection === 'function') switchOverviewSection(section, true);
    return;
  }
  if (hash && hash !== activeTab) switchTab(hash, true);
});

// Send theme color to PWA shell
top.postMessage({ themeColor: '#0891B2' }, '*');

// ===== Settings Tab =====
function renderSettingsTab() {
  if (!isOwner) {
    document.getElementById('settingsLock').style.display = '';
    document.getElementById('settingsLock').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">' +
      '<span class="material-icons-round" style="font-size:48px;">lock</span>' +
      '<div style="margin-top:12px;font-size:15px;font-weight:500;">Private Zone</div></div>';
    document.getElementById('settingsContent').style.display = 'none';
    return;
  }
  document.getElementById('settingsLock').style.display = 'none';
  document.getElementById('settingsContent').style.display = '';

  var s = appData.settings || {};
  var airport = s['app.airport'] || 'HKG';
  var home = s['app.home'] || 'overview';
  var priv = (s['app.private'] || '').split(',').filter(Boolean);

  var tabs = [
    { id: 'overview', label: 'Dashboard', icon: 'insights' },
    { id: 'checklist', label: 'Checklist', icon: 'checklist' },
    { id: 'postcard', label: 'Postcard', icon: 'mail' },
    { id: 'trip', label: 'Trip', icon: 'public' },
    { id: 'itinerary', label: 'Itinerary', icon: 'event_note' },
    { id: 'map', label: 'Map', icon: 'map' },
    { id: 'expenses', label: 'Expenses', icon: 'attach_money' }
  ];

  var html = '';

  // General section
  html += '<div class="group-header"><span class="group-header-title">General</span></div>';
  html += '<div class="settings-section">';
  html += '<div class="settings-row">';
  html += '<span class="material-icons-round settings-row-icon">flight_takeoff</span>';
  html += '<span class="settings-row-label">Home Airport</span>';
  html += '<input type="text" id="setAirport" class="settings-input" value="' + escAttr(airport) + '" maxlength="4" placeholder="IATA">';
  html += '</div>';
  html += '</div>';

  // Tab Settings section
  html += '<div class="group-header"><span class="group-header-title">Tab Settings</span></div>';
  html += '<div class="settings-section">';
  tabs.forEach(function(t) {
    var isHome = home === t.id;
    var isPrivate = priv.indexOf(t.id) >= 0;
    html += '<div class="settings-row">';
    html += '<span class="material-icons-round settings-row-icon">' + t.icon + '</span>';
    html += '<span class="settings-row-label">' + esc(t.label) + '</span>';
    html += '<button class="settings-home-btn' + (isHome ? ' active' : '') + '" onclick="setHomeTab(\'' + t.id + '\')" title="Set as home">';
    html += '<span class="material-icons-round">home</span></button>';
    html += '<button class="settings-toggle' + (isPrivate ? ' private' : '') + '" onclick="togglePrivateTab(\'' + t.id + '\')">';
    html += '<span class="material-icons-round">' + (isPrivate ? 'lock' : 'public') + '</span>';
    html += '</button>';
    html += '</div>';
  });
  html += '</div>';

  // API section
  var apiKey = s['app.apikey'] || '';
  if (apiKey) _fullApiKey = apiKey;
  var deployUrl = 'https://script.google.com/macros/s/AKfycbyLay2B_PaztGkmYYPbhlJi-U3H7c5BUcIhi1yQSCUWjqYSRfzWwh3j6bNNv9h1YphcqQ/exec';
  html += '<div class="group-header"><span class="group-header-title">API</span></div>';
  html += '<div class="settings-section">';
  html += '<div class="settings-row">';
  html += '<span class="material-icons-round settings-row-icon" style="font-size:16px;">key</span>';
  html += '<span id="apiKeyDisplay" style="flex:1;font-size:10px;color:var(--text-muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (apiKey || 'Not set') + '</span>';
  html += '<span class="material-icons-round" style="font-size:14px;color:var(--text-muted);cursor:pointer;padding:4px;" onclick="copyApiKey()" title="Copy">content_copy</span>';
  html += '<span class="material-icons-round" style="font-size:14px;color:var(--text-muted);cursor:pointer;padding:4px;" onclick="regenApiKey()" title="Regenerate">refresh</span>';
  html += '</div>';
  html += '<div class="settings-row">';
  html += '<span class="material-icons-round settings-row-icon" style="font-size:16px;">link</span>';
  html += '<span id="apiEndpoint" style="flex:1;font-size:9px;color:var(--text-muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(deployUrl) + '</span>';
  html += '<span class="material-icons-round" style="font-size:14px;color:var(--text-muted);cursor:pointer;padding:4px;" onclick="copyApiEndpoint()" title="Copy">content_copy</span>';
  html += '</div>';
  html += '</div>';

  // Save button
  html += '<div style="padding:16px 14px;">';
  html += '<button class="form-btn form-btn-primary" onclick="saveAppSettings()" style="width:100%;">Save</button>';
  html += '</div>';

  document.getElementById('settingsContent').innerHTML = html;
}

function setHomeTab(tabId) {
  document.querySelectorAll('.settings-home-btn').forEach(function(b) { b.classList.remove('active'); });
  event.currentTarget.classList.add('active');
}

function togglePrivateTab(tabId) {
  var btn = event.currentTarget;
  var isNowPrivate = !btn.classList.contains('private');
  btn.classList.toggle('private');
  var icon = btn.querySelector('.material-icons-round');
  icon.textContent = isNowPrivate ? 'lock' : 'public';
}

var _fullApiKey = '';

function copyApiKey() {
  var key = _fullApiKey || (appData.settings && appData.settings['app.apikey']) || '';
  if (!key) { warnToast('No API key. Click regenerate first.'); return; }
  _copyText(key, 'API key');
}
function copyApiEndpoint() {
  var el = document.getElementById('apiEndpoint');
  if (el) _copyText(el.textContent, 'Endpoint');
}
function regenApiKey() {
  startSync();
  google.script.run
    .withSuccessHandler(function(r) {
      endSync();
      if (r && r.error) { showToast(r.error, 'error'); return; }
      _fullApiKey = r.apikey;
      if (appData.settings) appData.settings['app.apikey'] = r.apikey;
      var display = document.getElementById('apiKeyDisplay');
      if (display) display.textContent = r.apikey;
      crudToast('generated', 'API key');
    })
    .withFailureHandler(function(e) { endSync(); failToast(null, 'generate key'); })
    .regenerateApiKey();
}

function saveAppSettings() {
  var airport = document.getElementById('setAirport').value.trim().toUpperCase();

  var homeBtn = document.querySelector('.settings-home-btn.active');
  var homeTab = 'overview';
  if (homeBtn) {
    var row = homeBtn.closest('.settings-row');
    var label = row.querySelector('.settings-row-label').textContent.toLowerCase();
    var tabs = { dashboard:'overview', checklist:'checklist', postcard:'postcard', trip:'trip', itinerary:'itinerary', map:'map', expenses:'expenses' };
    homeTab = tabs[label] || 'overview';
  }

  var privateTabs = [];
  document.querySelectorAll('.settings-toggle.private').forEach(function(btn) {
    var row = btn.closest('.settings-row');
    var label = row.querySelector('.settings-row-label').textContent.toLowerCase();
    var tabs = { dashboard:'overview', checklist:'checklist', postcard:'postcard', trip:'trip', itinerary:'itinerary', map:'map', expenses:'expenses' };
    if (tabs[label]) privateTabs.push(tabs[label]);
  });

  var settings = {
    'app.airport': airport || 'HKG',
    'app.home': homeTab,
    'app.private': privateTabs.join(',') || ''
  };

  startSync();
  google.script.run
    .withSuccessHandler(function(r) {
      endSync();
      if (r && r.error) { showToast(r.error, 'error'); return; }
      appData.settings = settings;
      crudToast('saved', 'Settings');
    })
    .withFailureHandler(function(e) { endSync(); failToast(null, 'save'); })
    .saveSettings(settings);
}

// ===== Gear Icon → Login or Settings =====
function onGearClick() {
  if (appData && appData.isOwner) {
    switchTab('settings');
  } else {
    // Non-owner: show lock screen
    showToast('Private Zone', 'info');
  }
}

// ===== Online/Offline Detection =====
function onRefreshClick() {
  if (navigator.onLine) {
    refreshData();
  } else {
    var syncTime = localStorage.getItem('traveller_sync') || 'unknown';
    showToast('Offline · Last synced: ' + syncTime, 'info');
  }
}

function updateOnlineStatus() {
  var icon = document.getElementById('refreshIcon');
  if (!icon) return;
  icon.textContent = navigator.onLine ? 'refresh' : 'cloud_off';
}

window.addEventListener('online', function() {
  updateOnlineStatus();
  showToast('Back online', 'success');
});
window.addEventListener('offline', function() {
  updateOnlineStatus();
  showToast('You are offline', 'info');
});
</script>
