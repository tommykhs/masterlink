<!-- Split JS modules -->
<script>
// ===== Shared State =====
var _itinTodayIdx = -1;

// ===== Shared Constants =====
var catColors = {
  'Flight': '#6366F1', 'Accommodation': '#0891B2', 'Food': '#F59E0B',
  'Explore': '#10B981', 'Shop': '#EC4899', 'Transport': '#8B5CF6', 'Others': '#94A3B8'
};
var catIcons = {
  'Flight': 'flight', 'Transport': 'directions_transit', 'Food': 'restaurant',
  'Shop': 'shopping_bag', 'Explore': 'explore', 'Accommodation': 'hotel', 'Others': 'more_horiz'
};
var catIconUnicode = {
  'Flight': '\ue539', 'Transport': '\ue535', 'Food': '\ue56c',
  'Shop': '\uf1cc', 'Explore': '\ue87a', 'Accommodation': '\ue53a', 'Others': '\ue5d3'
};
var _allCatNames = ['Flight', 'Accommodation', 'Food', 'Explore', 'Shop', 'Transport', 'Others'];

// ===== Toast (inline banner below header) =====
var _toastTimer = null;
var _pendingOps = 0;

function showToast(msg, type) {
  type = type || 'info';
  var t = document.getElementById('updateToast');
  t.textContent = msg;
  t.className = 'update-toast ' + type + ' show';
  if (_toastTimer) clearTimeout(_toastTimer);
  var dur = type === 'error' ? 0 : (type === 'warning' ? 3000 : 2000);
  if (dur > 0) {
    _toastTimer = setTimeout(function() { t.classList.remove('show'); _toastTimer = null; }, dur);
  }
}
function crudToast(action, entity) { showToast(entity + ' ' + action, 'success'); }
function failToast(err, action) {
  var msg = action ? 'Failed to ' + action : 'Failed';
  if (err && (err.message || typeof err === 'string')) msg += ': ' + (err.message || err);
  showToast(msg, 'error');
}
function warnToast(msg) { showToast(msg, 'warning'); }

function clearToast() {
  var t = document.getElementById('updateToast');
  t.classList.remove('show');
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
}

// Sync tracking
function startSync() {
  _pendingOps++;
  updateSyncStatus();
}

function endSync(success) {
  _pendingOps = Math.max(0, _pendingOps - 1);
  updateSyncStatus();
}

function updateSyncStatus() {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  if (_pendingOps > 0) {
    el.innerHTML = '<span class="material-icons-round sync-spin">sync</span>';
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

// ===== Helpers =====
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s.toString(); return d.innerHTML; }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function formatDateShort(d) {
  if (!d) return '';
  var date = new Date(d);
  if (isNaN(date)) return d.toString();
  return (date.getMonth() + 1) + '/' + date.getDate();
}

// Parse any date string into a Date object
// Handles: "2026-04-08", "4/8(Wed)", "4/8/2026", "4/8", "04/08/2026"
function parseAnyDate(s, yearHint) {
  if (!s) return null;
  s = s.toString().trim();
  // ISO: 2026-04-08
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return new Date(s + 'T00:00:00');
  // M/D(Day) or M/D/YYYY or M/D
  var m = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4})|\(|$)/);
  if (m) {
    var year = m[3] ? parseInt(m[3]) : (yearHint || new Date().getFullYear());
    return new Date(year, parseInt(m[1]) - 1, parseInt(m[2]));
  }
  // Fallback
  var d = new Date(s);
  return isNaN(d) ? null : d;
}

// Extract just M/D from any date format
function shortDate(s) {
  if (!s) return '';
  var d = parseAnyDate(s);
  if (d) return (d.getMonth() + 1) + '/' + d.getDate();
  return s.toString();
}

// Convert any date to "M/D(Day)" display format
function displayDate(s) {
  if (!s) return '';
  s = s.toString().trim();
  // Already display format with day name
  if (s.match(/^\d{1,2}\/\d{1,2}\([A-Z]/i)) return s;
  var dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var d = parseAnyDate(s);
  if (d) return (d.getMonth() + 1) + '/' + d.getDate() + '(' + dow[d.getDay()] + ')';
  return s;
}

function formatDateRange(a, b) {
  var d1 = new Date(a), d2 = new Date(b);
  if (isNaN(d1) || isNaN(d2)) return '';
  return (d1.getMonth() + 1) + '/' + d1.getDate() + ' - ' + (d2.getMonth() + 1) + '/' + d2.getDate();
}

function daysBetween(a, b) {
  var d1 = new Date(a), d2 = new Date(b);
  if (isNaN(d1) || isNaN(d2)) return 0;
  return Math.round((d2 - d1) / 86400000) + 1;
}

function parseCost(val) {
  if (!val) return 0;
  return parseFloat(val.toString().replace(/[^0-9.]/g, '')) || 0;
}

function formatNum(n) {
  if (!n) return '0';
  return n.toLocaleString('en', { maximumFractionDigits: 2, minimumFractionDigits: 0 });
}

function flagUrl(currency) {
  var map = {
    'JPY': 'jp', 'NZD': 'nz', 'AUD': 'au', 'EUR': 'eu',
    'USD': 'us', 'GBP': 'gb', 'KRW': 'kr', 'TWD': 'tw',
    'CNY': 'cn', 'THB': 'th', 'HKD': 'hk', 'SGD': 'sg',
    'MYR': 'my', 'PHP': 'ph', 'IDR': 'id', 'VND': 'vn',
    'INR': 'in', 'CAD': 'ca', 'CHF': 'ch'
  };
  var code = (currency || '').replace(/[^A-Z]/g, '');
  var cc = map[code] || '';
  return cc ? 'https://flagcdn.com/w80/' + cc + '.png' : '';
}

function formatTime(t) {
  if (!t) return '';
  var s = t.toString();
  if (s.includes('T') || s.includes('GMT')) {
    var d = new Date(t);
    if (!isNaN(d)) {
      var h = d.getHours(), m = d.getMinutes();
      return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
    }
  }
  // Pad simple time like "5:40" to "05:40" for input[type=time]
  var parts = s.split(':');
  if (parts.length === 2) {
    var hh = ('0' + parts[0].trim()).slice(-2);
    var mm = ('0' + parts[1].trim()).slice(-2);
    return hh + ':' + mm;
  }
  return s;
}

function timeToMin(t) {
  var s = formatTime(t);
  var p = s.split(':');
  if (p.length < 2) return 9999;
  return parseInt(p[0]) * 60 + parseInt(p[1]);
}

// Convert display date like "4/8(Wed)" to ISO "2026-04-08" using trip year
function displayDateToISO(dateStr, tripStart) {
  if (!dateStr) return '';
  var s = dateStr.toString().trim();
  // Already ISO
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0, 10);
  var yearHint = tripStart ? new Date(tripStart).getFullYear() : new Date().getFullYear();
  var d = parseAnyDate(s, yearHint);
  if (!d) return '';
  return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
}

// Today as ISO string
function todayISO() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
}

// Check if a date string matches today
function isToday(dateStr) {
  if (!dateStr) return false;
  var today = todayISO();
  var iso = displayDateToISO(dateStr, currentTrip ? currentTrip.start : null);
  return iso === today;
}

// Get current time as HH:MM
function nowTime() {
  var d = new Date();
  return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}

// Default date for forms — today if within trip range, otherwise trip start
function defaultFormDate() {
  if (!currentTrip) return todayISO();
  var today = todayISO();
  var dr = tripDateRange();
  if (today >= dr.min && today <= dr.max) return today;
  return currentTrip.start || dr.min;
}

// Form validation — returns true if valid, shows toast if not
function validateForm(rules) {
  for (var i = 0; i < rules.length; i++) {
    var r = rules[i];
    var el = document.getElementById(r.id);
    var val = el ? el.value.trim() : '';
    if (r.required && !val) { warnToast(r.label + ' is required'); if (el) el.focus(); return false; }
    if (r.numeric && val && isNaN(parseFloat(val))) { warnToast(r.label + ' must be a number'); if (el) el.focus(); return false; }
  }
  return true;
}

function _copyText(text, label) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(function() { showToast(label + ' copied', 'info'); })
      .catch(function() { _copyFallback(text, label); });
  } else {
    _copyFallback(text, label);
  }
}
function _copyFallback(text, label) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast(label + ' copied', 'info'); }
  catch(e) { warnToast('Copy failed'); }
  document.body.removeChild(ta);
}

function copyAddress(addr) {
  _copyText(addr, 'Address');
}

<script>
var _closingPicker = false;
var _confirmCallback = null;
var _formCallback = null;

// ===== Cost Helpers =====
function cleanCostInput(el) {
  el.value = el.value.replace(/[^0-9.]/g, '');
}

function tripDateRange() {
  if (!currentTrip) return { min: '', max: '' };
  var s = new Date(currentTrip.start);
  var e = new Date(currentTrip.end);
  s.setDate(s.getDate() - 1);
  e.setDate(e.getDate() + 1);
  return {
    min: s.getFullYear() + '-' + ('0' + (s.getMonth() + 1)).slice(-2) + '-' + ('0' + s.getDate()).slice(-2),
    max: e.getFullYear() + '-' + ('0' + (e.getMonth() + 1)).slice(-2) + '-' + ('0' + e.getDate()).slice(-2)
  };
}

// ===== Form Helpers =====
// Build an input with icon prefix: fld('event', 'id', 'date', val, 'placeholder')
function fld(icon, id, type, val, ph, extra) {
  var isSelect = type === 'select';
  var cls = isSelect ? 'form-select' : 'form-input';
  var iconIsText = icon.length <= 2 || icon.includes('$');
  var prefixCls = iconIsText ? 'form-prefix' : 'form-prefix material-icons-round';
  var inp;
  if (isSelect) {
    inp = '<select class="' + cls + '" id="' + id + '"' + (extra || '') + '>' + (val || '') + '</select>';
  } else if (type === 'time' || type === 'date') {
    // Use text initially so placeholder shows, switch to date/time on focus
    var actualType = type;
    var inputType = val ? actualType : 'text';
    inp = '<input class="' + cls + '" id="' + id + '" type="' + inputType + '" value="' + escAttr(val || '') + '"' +
      (ph ? ' placeholder="' + escAttr(ph) + '"' : '') +
      ' onfocus="if(this.type!==\'' + actualType + '\'){this.type=\'' + actualType + '\';var s=this;setTimeout(function(){try{s.showPicker()}catch(e){s.click()}},50);}"' +
      ' onblur="if(!this.value)this.type=\'text\'"' +
      (extra || '') + '>';
  } else {
    var placeholder = ph || ' ';
    inp = '<input class="' + cls + '" id="' + id + '"' + (type ? ' type="' + type + '"' : '') + ' value="' + escAttr(val || '') + '" placeholder="' + escAttr(placeholder) + '"' + (extra || '') + '>';
  }
  var clearBtn = (!isSelect && type !== 'time' && type !== 'date') ? '<button class="form-clear" type="button" onclick="var i=this.previousElementSibling;i.value=\'\';i.focus();i.dispatchEvent(new Event(\'input\'));">&times;</button>' : '';
  return '<div class="form-group"><div class="form-input-prefix">' +
    '<span class="' + prefixCls + '">' + icon + '</span>' +
    inp + clearBtn + '</div></div>';
}

// ===== Form Modal =====

function openFormModal(title, bodyHtml, onSave) {
  document.getElementById('formModalTitle').textContent = title;
  document.getElementById('formModalBody').innerHTML = bodyHtml;
  _formCallback = onSave;
  document.getElementById('formModal').classList.add('active');
  // Push state so back button closes the form
  history.pushState({ formOpen: true }, '');
}

function setFormSaving(saving) {
  var btns = document.querySelectorAll('#formModalBody .form-btn-primary');
  btns.forEach(function(btn) {
    if (saving) {
      btn.dataset.origText = btn.textContent;
      btn.textContent = 'Saving...';
      btn.disabled = true;
      btn.style.opacity = '0.6';
    } else {
      btn.textContent = btn.dataset.origText || 'Save';
      btn.disabled = false;
      btn.style.opacity = '';
    }
  });
}

function closeFormModal() {
  setFormSaving(false);
  document.getElementById('formModal').classList.remove('active');
  _formCallback = null;
  // Pop the form state if it's still there
  if (history.state && history.state.formOpen) {
    history.back();
  }
}

// Close modals on back button — close top layer first
window.addEventListener('popstate', function(e) {
  // If we're programmatically closing the picker, don't cascade
  if (_closingPicker) return;

  // Picker modal (topmost z-index 210)
  var picker = document.getElementById('pickerModal');
  if (picker && picker.classList.contains('active')) {
    picker.classList.remove('active');
    return; // don't close anything else
  }
  // Confirm dialog
  var confirm = document.getElementById('confirmDialog');
  if (confirm && confirm.classList.contains('active')) {
    confirm.classList.remove('active');
    _confirmCallback = null;
    return;
  }
  // Form modal
  var modal = document.getElementById('formModal');
  if (modal && modal.classList.contains('active')) {
    modal.classList.remove('active');
    _formCallback = null;
    return;
  }
  // Trip modal
  var tripModal = document.getElementById('tripModal');
  if (tripModal && tripModal.classList.contains('active')) {
    tripModal.classList.remove('active');
  }
});

function submitForm() {
  if (_formCallback) _formCallback();
}

// ===== Confirm Dialog =====

function showConfirm(msg, onConfirm) {
  document.getElementById('confirmMsg').textContent = msg;
  _confirmCallback = onConfirm;
  document.getElementById('confirmAction').onclick = function() {
    var cb = _confirmCallback;
    closeConfirm();
    if (cb) cb();
  };
  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('active');
  _confirmCallback = null;
}

// ===== Swipe-to-Reveal =====
var _activeSwipe = null;

function initSwipeRows(container) {
  if (!isOwner) return;
  var rows = container.querySelectorAll('.swipe-container');
  rows.forEach(function(row) {
    var content = row.querySelector('.swipe-content');
    var actions = row.querySelector('.swipe-actions');
    if (!content || !actions) return;
    var actionsW = actions.scrollWidth || actions.offsetWidth || (actions.children.length * 44);
    var startX = 0, currentX = 0, dragging = false;

    function onStart(x) {
      // Close any other open swipe
      if (_activeSwipe && _activeSwipe !== row) resetSwipe(_activeSwipe);
      startX = x; dragging = true;
      content.style.transition = 'none';
    }
    function onMove(x) {
      if (!dragging) return;
      var dx = x - startX;
      // Only allow swipe left (negative)
      if (dx > 0) dx = 0;
      if (dx < -actionsW) dx = -actionsW;
      currentX = dx;
      content.style.transform = 'translateX(' + dx + 'px)';
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      content.style.transition = 'transform 0.2s ease';
      if (currentX < -actionsW / 3) {
        // Snap open
        content.style.transform = 'translateX(' + (-actionsW) + 'px)';
        _activeSwipe = row;
      } else {
        // Snap closed
        content.style.transform = 'translateX(0)';
        if (_activeSwipe === row) _activeSwipe = null;
      }
      currentX = 0;
    }

    // Touch events
    content.addEventListener('touchstart', function(e) {
      onStart(e.touches[0].clientX);
    }, { passive: true });
    content.addEventListener('touchmove', function(e) {
      onMove(e.touches[0].clientX);
    }, { passive: true });
    content.addEventListener('touchend', onEnd);

    // Mouse events (desktop)
    content.addEventListener('mousedown', function(e) {
      onStart(e.clientX);
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (dragging) onMove(e.clientX);
    });
    document.addEventListener('mouseup', function() {
      if (dragging) onEnd();
    });
  });
}

function resetSwipe(row) {
  if (!row) return;
  var content = row.querySelector('.swipe-content');

function _getUsedFlags() {
  if (!appData || !appData.trips) return [];
  var used = {};
  appData.trips.forEach(function(t) {
    if (t.flag) {
      // Extract cc from flagcdn URL or legacy URL
      var m = t.flag.match(/flagcdn\.com\/\w+\/(\w+)\./);
      if (m) used[m[1]] = (used[m[1]] || 0) + 1;
    }
    var cc = _currencyToCC(t.currency);
    if (cc) used[cc] = (used[cc] || 0) + 1;
  });
  return Object.keys(used).sort(function(a, b) { return used[b] - used[a]; });
}

function _getUsedCurrencies() {
  if (!appData || !appData.trips) return [];
  var used = {};
  appData.trips.forEach(function(t) {
    if (t.currency) {
      var code = t.currency.replace(/[^A-Z]/g, '');
      used[code] = (used[code] || 0) + 1;
    }
  });
  return Object.keys(used).sort(function(a, b) { return used[b] - used[a]; });
}

function _currencyToCC(cur) {
  if (!cur) return '';
  var code = cur.replace(/[^A-Z]/g, '');
  var c = _allCurrencies.find(function(x) { return x.code === code; });
  return c ? c.cc : '';
}

function openPickerModal(title, bodyHtml) {
  document.getElementById('pickerModalTitle').textContent = title;
  document.getElementById('pickerModalBody').innerHTML = bodyHtml;
  document.getElementById('pickerModal').classList.add('active');

}

function closePickerModal() {
  document.getElementById('pickerModal').classList.remove('active');
  _closingPicker = true;
  if (history.state && history.state.pickerOpen) history.back();
  setTimeout(function() { _closingPicker = false; }, 100);
}

function openFlagPicker(onSelect) {
  var usedCCs = _getUsedFlags();
  var sorted = _allCountries.slice().sort(function(a, b) {
    var ai = usedCCs.indexOf(a.cc), bi = usedCCs.indexOf(b.cc);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.name.localeCompare(b.name);
  });

  var h = '<div class="form-group"><div class="form-input-prefix"><span class="form-prefix material-icons-round">search</span>';
  h += '<input class="form-input" id="flagSearch" placeholder="Search country..." oninput="filterPicker(\'flagGrid\',this.value)"></div></div>';
  h += '<div id="flagGrid" style="display:flex;flex-wrap:wrap;gap:6px;max-height:50vh;overflow-y:auto;">';
  sorted.forEach(function(c) {
    var url = 'https://flagcdn.com/w80/' + c.cc + '.png';

    h += '<div style="font-size:9px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(c.name) + '</div>';
    h += '</div>';
  });
  h += '</div>';

  window._pickerCallback = onSelect;
  openPickerModal('Pick Flag', h);
}

function openCurrencyPicker(onSelect) {
  var usedCodes = _getUsedCurrencies();
  var sorted = _allCurrencies.slice().sort(function(a, b) {
    var ai = usedCodes.indexOf(a.code), bi = usedCodes.indexOf(b.code);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.code.localeCompare(b.code);
  });

  var h = '<div class="form-group"><div class="form-input-prefix"><span class="form-prefix material-icons-round">search</span>';
  h += '<input class="form-input" id="curSearch" placeholder="Search currency..." oninput="filterPicker(\'curGrid\',this.value)"></div></div>';
  h += '<div id="curGrid" style="max-height:50vh;overflow-y:auto;">';
  sorted.forEach(function(c) {
    var flagUrl = 'https://flagcdn.com/w40/' + c.cc + '.png';
    h += '<div class="picker-item" data-search="' + escAttr((c.code + ' ' + c.name + ' ' + c.symbol).toLowerCase()) + '" onclick="selectPickerItem(\'' + escAttr(c.code + c.symbol) + '\')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);">';

    h += '<span style="font-size:13px;width:24px;color:var(--text-muted);">' + esc(c.symbol) + '</span>';
    h += '<span style="font-size:12px;color:var(--text-light);flex:1;">' + esc(c.name) + '</span>';
    h += '</div>';
  });
  h += '</div>';

  window._pickerCallback = onSelect;
  openPickerModal('Pick Currency', h);
}

function selectPickerItem(value) {
  closePickerModal();
  if (window._pickerCallback) {
    window._pickerCallback(value);
    window._pickerCallback = null;
  }
}

function filterPicker(gridId, query) {
  var grid = document.getElementById(gridId);
  if (!grid) return;
  var q = query.toLowerCase().trim();
  grid.querySelectorAll('.picker-item').forEach(function(el) {
    el.style.display = (!q || el.getAttribute('data-search').includes(q)) ? '' : 'none';
  });
}

<script>
// ===== Overview Tab =====
var donutChartInstance = null;
var _overviewSection = 'dashboard';

function switchOverviewSection(section, fromHash) {
  _overviewSection = section;
  try { localStorage.setItem('traveller_ov_section', section); } catch(e) {}
  var hash = section === 'dashboard' ? '#overview' : '#overview-' + section;
  if (!fromHash && location.hash !== hash) {
    history.pushState(null, '', hash);
  }
  var sections = document.querySelectorAll('.overview-section');
  for (var i = 0; i < sections.length; i++) sections[i].style.display = 'none';

  // Check privacy for sub-sections
  var settings = (appData && appData.settings) || {};
  var privateTabs = (settings['app.private'] || '').split(',').filter(Boolean);
  var isSectionPrivate = !isOwner && privateTabs.indexOf(section) >= 0;

  var target = section === 'dashboard' ? 'overviewDashboard' : section === 'checklist' ? 'overviewChecklist' : 'overviewPostcard';
  var el = document.getElementById(target);
  if (el) {
    if (isSectionPrivate) {
      el.style.display = '';
      el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><span class="material-icons-round" style="font-size:48px;display:block;margin-bottom:12px;">lock</span>Private Zone</div>';
    } else {
      el.style.display = '';
    }
  }
  // Update sub-nav active
  var items = document.querySelectorAll('#overviewNav .sub-nav-item');
  for (var j = 0; j < items.length; j++) {
    items[j].classList.toggle('active', items[j].dataset.section === section);
  }
  // Show add button for checklist/postcard (owner only, not private)
  var addBtn = document.getElementById('headerAddBtn');
  if (addBtn) {
    addBtn.style.display = (isOwner && (section === 'checklist' || section === 'postcard')) ? '' : 'none';
  }
}

function switchExpChart(mode) {
  var totalEl = document.getElementById('tripExpBars');
  var dailyEl = document.getElementById('dailyExpBars');
  var badge = document.getElementById('ovExpBadge');
  var btns = document.querySelectorAll('.ov-exp-toggle-btn');
  if (mode === 'total') {
    if (totalEl) totalEl.style.display = '';
    if (dailyEl) dailyEl.style.display = 'none';
    if (badge) badge.textContent = window._ovExpTotal || '';
  } else {
    if (totalEl) totalEl.style.display = 'none';
    if (dailyEl) dailyEl.style.display = '';
    if (badge) badge.textContent = window._ovExpDaily || '';
  }
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', (mode === 'total' && i === 0) || (mode === 'daily' && i === 1));
  }
}

function renderOverviewTab() {
  if (!appData || !appData.trips) return;

  var allCats = ['Flight', 'Accommodation', 'Food', 'Explore', 'Shop', 'Transport', 'Others'];
  var trips = appData.trips.slice().sort(function(a, b) {
    return (b.start || '').localeCompare(a.start || '');
  });
  var expenses = appData.expenses || [];
  var plans = appData.plans || [];

  // Travel Calendar badge — total trips + total days
  var totalTripDays = 0;
  trips.forEach(function(t) { var d = daysBetween(t.start, t.end); if (typeof d === 'number') totalTripDays += d; });
  document.getElementById('ovCalBadge').textContent = totalTripDays + 'd';

  var labels = [];
  var datasets = {};
  allCats.forEach(function(cat) { datasets[cat] = []; });
  var perDayData = [];

  trips.forEach(function(t) {
    labels.push(t.trip);
    var tripExp = expenses.filter(function(e) { return e.trip === t.trip; });
    var days = daysBetween(t.start, t.end);
    var tripTotal = 0;

    allCats.forEach(function(cat) {
      var catTotal = 0;
      tripExp.forEach(function(e) {
        if ((e.category || 'Others') === cat) catTotal += parseCost(e.hkCost);
      });
      datasets[cat].push(catTotal);
      tripTotal += catTotal;
    });

    perDayData.push(days > 0 ? Math.round(tripTotal / days) : 0);
  });

  // CSS Trip Expenses bars
  var maxTotal = 1;
  var tripTotals = [];
  trips.forEach(function(t, i) {
    var total = 0;
    allCats.forEach(function(cat) { total += datasets[cat][i]; });
    tripTotals.push(total);
    if (total > maxTotal) maxTotal = total;
  });

  window._tripExpData = [];

  var nonZeroTotals = tripTotals.filter(function(t) { return t > 0; });
  var avgTripExp = nonZeroTotals.length > 0 ? Math.round(nonZeroTotals.reduce(function(a, b) { return a + b; }, 0) / nonZeroTotals.length) : 0;
  var avgTripPct = maxTotal > 0 ? (avgTripExp / maxTotal * 100) : 0;

  var bhtml = '<div style="position:relative;">';
  var tipIdx = 0;
  trips.forEach(function(t, i) {
    var total = tripTotals[i];
    if (total <= 0) return; // skip trips with no expenses
    var breakdown = [];
    allCats.forEach(function(cat) {
      if (datasets[cat][i] > 0) breakdown.push({ icon: catIcons[cat] || 'label', color: catColors[cat], val: '$' + formatNum(datasets[cat][i]) });
    });
    breakdown.push({ icon: 'today', color: '#E53E3E', val: '$' + formatNum(perDayData[i]) + '/d' });
    window._tripExpData.push(breakdown);

    bhtml += '<div class="ov-bar-row" onclick="showBarTip(event, ' + tipIdx + ',\'trip\')">';
    bhtml += '<div class="ov-bar-label">' + esc(t.trip) + '</div>';
    bhtml += '<div class="ov-bar-track">';
    allCats.forEach(function(cat) {
      var val = datasets[cat][i];
      if (val > 0) {
        var segPct = total > 0 ? (val / maxTotal * 100) : 0;
        bhtml += '<div class="ov-bar-seg" style="width:' + segPct + '%;background:' + catColors[cat] + '"></div>';
      }
    });
    bhtml += '</div>';
    bhtml += '<div class="ov-bar-amt">$' + formatNum(total) + '</div>';
    bhtml += '</div>';
    tipIdx++;
  });
  if (avgTripExp > 0 && nonZeroTotals.length > 1) {
    bhtml += '<div class="ov-avg-line" style="left:calc(116px + (100% - 116px - 56px) * ' + avgTripPct + ' / 100);"></div>';
  }
  bhtml += '</div>';
  bhtml += '<div class="ov-legend">';
  allCats.forEach(function(cat) {
    bhtml += '<span class="ov-legend-item"><span class="ov-legend-dot" style="background:' + catColors[cat] + '"></span>' + esc(cat) + '</span>';
  });
  bhtml += '</div>';
  document.getElementById('tripExpBars').innerHTML = bhtml;

  // Expenses badge — total calculated now, daily set later
  var grandTripTotal = 0;
  tripTotals.forEach(function(t) { grandTripTotal += t; });
  window._ovExpTotal = '$' + formatNum(grandTripTotal);

  // CSS Daily Expense bars
  var maxDaily = 1;
  var dailyRows = [];
  trips.forEach(function(t, i) {
    var days = daysBetween(t.start, t.end);
    var accom = datasets['Accommodation'] ? datasets['Accommodation'][i] : 0;
    var other = 0;
    allCats.forEach(function(cat) {
      if (cat !== 'Flight' && cat !== 'Accommodation') other += datasets[cat][i];
    });
    var accomD = days > 0 ? Math.round(accom / days) : 0;
    var spendD = days > 0 ? Math.round(other / days) : 0;
    var totalD = accomD + spendD;
    if (totalD > maxDaily && totalD > 0) maxDaily = totalD;
    dailyRows.push({ trip: t.trip, accomD: accomD, spendD: spendD, totalD: totalD });
  });

  window._dailyExpData = [];

  // Compute average before rendering (exclude trips with $0)
  var nonZeroDaily = dailyRows.filter(function(r) { return r.totalD > 0; });
  var totalDaily = 0;
  nonZeroDaily.forEach(function(r) { totalDaily += r.totalD; });
  var avgDaily = nonZeroDaily.length > 0 ? Math.round(totalDaily / nonZeroDaily.length) : 0;
  var avgPct = maxDaily > 0 ? (avgDaily / maxDaily * 100) : 0;

  var dhtml = '<div style="position:relative;">';
  var dailyTipIdx = 0;
  dailyRows.forEach(function(r, i) {
    if (r.totalD <= 0) return; // skip trips with no expenses
    window._dailyExpData.push([
      { icon: 'hotel', color: catColors['Accommodation'], val: '$' + formatNum(r.accomD) + '/d' },
      { icon: 'payments', color: '#84CC16', val: '$' + formatNum(r.spendD) + '/d' },
      { icon: 'functions', color: 'var(--text)', val: '$' + formatNum(r.totalD) + '/d' }
    ]);

    dhtml += '<div class="ov-bar-row" onclick="showBarTip(event, ' + dailyTipIdx + ',\'daily\')">';
    dhtml += '<div class="ov-bar-label">' + esc(r.trip) + '</div>';
    dhtml += '<div class="ov-bar-track">';
    if (r.accomD > 0) dhtml += '<div class="ov-bar-seg" style="width:' + (r.accomD / maxDaily * 100) + '%;background:' + catColors['Accommodation'] + '"></div>';
    if (r.spendD > 0) dhtml += '<div class="ov-bar-seg" style="width:' + (r.spendD / maxDaily * 100) + '%;background:#84CC16"></div>';
    dhtml += '</div>';
    dhtml += '<div class="ov-bar-amt">$' + formatNum(r.totalD) + '/d</div>';
    dhtml += '</div>';
    dailyTipIdx++;
  });
  // Average line — positioned over the bar track area
  if (avgDaily > 0 && nonZeroDaily.length > 1) {
    dhtml += '<div class="ov-avg-line" style="left:calc(116px + (100% - 116px - 56px) * ' + avgPct + ' / 100);"></div>';
  }
  dhtml += '</div>';
  dhtml += '<div class="ov-legend">';
  dhtml += '<span class="ov-legend-item"><span class="ov-legend-dot" style="background:' + catColors['Accommodation'] + '"></span>Accommodation</span>';
  dhtml += '<span class="ov-legend-item"><span class="ov-legend-dot" style="background:#84CC16"></span>Daily Spend</span>';
  dhtml += '</div>';
  document.getElementById('dailyExpBars').innerHTML = dhtml;

  // Now set daily badge and default badge
  window._ovExpDaily = '$' + formatNum(avgDaily) + '/d';
  document.getElementById('ovExpBadge').textContent = window._ovExpTotal;

  // Travel Calendar Heatmap
  var expenses = appData.expenses || [];
  var tripExpTotals = {};
  expenses.forEach(function(e) {
    if (!tripExpTotals[e.trip]) tripExpTotals[e.trip] = 0;
    tripExpTotals[e.trip] += parseCost(e.hkCost);
  });

  function expColor(total) {
    if (total <= 0) return 'rgba(229,62,62,0.15)';
    if (total <= 3000) return 'rgba(229,62,62,0.3)';
    if (total <= 6000) return 'rgba(229,62,62,0.5)';
    if (total <= 10000) return 'rgba(229,62,62,0.7)';
    return 'rgba(229,62,62,1)';
  }

  var tripMonths = {};
  var yearSet = {};
  var occupied = {}; // 'YYYY-MM' => true

  // Sort by start date (earliest first) so earlier trips claim their month first
  var sortedTrips = appData.trips.slice().sort(function(a, b) {
    return (a.start || '').localeCompare(b.start || '');
  });

  sortedTrips.forEach(function(t) {
    var startD = new Date(t.start);
    var endD = new Date(t.end);
    if (isNaN(startD) || isNaN(endD)) return;
    var total = tripExpTotals[t.trip] || 0;
    var color = expColor(total);

    // Try start month first, if occupied push to next month
    var y = startD.getFullYear();
    var m = startD.getMonth();
    var key = y + '-' + m;

    if (occupied[key]) {
      // Push to next month (within trip's date range or start+1)
      var nextD = new Date(y, m + 1, 1);
      y = nextD.getFullYear();
      m = nextD.getMonth();
      key = y + '-' + m;
    }

    yearSet[y] = true;
    if (!tripMonths[y]) tripMonths[y] = {};
    if (!tripMonths[y][m]) tripMonths[y][m] = [];
    tripMonths[y][m].push({ name: t.trip, color: color, total: total, flag: t.flag || '' });
    occupied[key] = true;
  });

  var years = Object.keys(yearSet).map(Number).sort(function(a, b) { return b - a; });
  var months = ['J','F','M','A','M','J','J','A','S','O','N','D'];

  var hhtml = '<div class="cal-grid">';
  hhtml += '<div class="cal-row"><div class="cal-year"></div>';
  months.forEach(function(m) { hhtml += '<div class="cal-month-hdr">' + m + '</div>'; });
  hhtml += '</div>';

  years.forEach(function(y) {
    hhtml += '<div class="cal-row"><div class="cal-year">' + y + '</div>';
    for (var m = 0; m < 12; m++) {
      var trps = (tripMonths[y] && tripMonths[y][m]) || [];
      if (trps.length > 0) {
        var tipText = trps.map(function(x) { return x.name + ' $' + formatNum(x.total); }).join('\n');
        var t0 = trps[0];
        var flagsHtml = t0.flag ? '<img src="' + escAttr(t0.flag) + '" class="cal-flag" alt="" title="' + escAttr(tipText) + '">' : '<span class="cal-dot" style="background:' + t0.color + '" title="' + escAttr(tipText) + '"></span>';
        var tripNames = trps.map(function(x) { return x.name; });
        hhtml += '<div class="cal-cell cal-filled" data-trips="' + escAttr(tripNames.join('|')) + '" data-tip="' + escAttr(tipText) + '" title="' + escAttr(tipText) + '">' + flagsHtml + '</div>';
      } else {
        hhtml += '<div class="cal-cell"></div>';
      }
    }
    hhtml += '</div>';
  });
  hhtml += '</div>';

  hhtml += '<div class="cal-legend"><span class="cal-legend-label">Tap flag for trip details</span></div>';

  document.getElementById('calendarHeatmap').innerHTML = hhtml;

  document.querySelectorAll('.cal-filled').forEach(function(el) {
    el.addEventListener('click', function() {
      var tripName = (el.getAttribute('data-trips') || '').split('|')[0];
      if (tripName) {
        selectedTrip = tripName;
        saveSelectedTrip(selectedTrip);
        renderApp();
        switchTab('trip');
      }
    });
  });

  var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var textColor = isDark ? '#aaa' : '#666';

  // Pie chart
  if (donutChartInstance) donutChartInstance.destroy();
  var donutCtx = document.getElementById('donutChart').getContext('2d');

  var donutLabels = [];
  var donutData = [];
  var donutColors = [];
  allCats.forEach(function(cat) {
    var total = 0;
    datasets[cat].forEach(function(v) { total += v; });
    if (total > 0) {
      donutLabels.push(cat);
      donutData.push(total);
      donutColors.push(catColors[cat]);
    }
  });

  var grandTotal = donutData.reduce(function(a, b) { return a + b; }, 0);

  var pieIconPlugin = {
    id: 'pieIcons',
    afterDraw: function(chart) {
      var ctx = chart.ctx;
      var meta = chart.getDatasetMeta(0);
      var total = chart.data.datasets[0].data.reduce(function(a, b) { return a + b; }, 0);
      ctx.save();

      meta.data.forEach(function(arc, i) {
        var label = chart.data.labels[i];
        var iconChar = catIconUnicode[label] || '';
        if (!iconChar) return;
        var val = chart.data.datasets[0].data[i];
        var pct = total > 0 ? val / total : 0;
        var centerAngle = (arc.startAngle + arc.endAngle) / 2;

        if (pct >= 0.10) {
          ctx.font = '16px "Material Icons Round"';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          var r = arc.outerRadius * 0.6;
          var x = arc.x + Math.cos(centerAngle) * r;
          var y = arc.y + Math.sin(centerAngle) * r;
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillText(iconChar, x, y);
        } else {
          var innerR = arc.outerRadius * 0.85;
          var outerR = arc.outerRadius + 20;
          var labelR = arc.outerRadius + 30;
          var x1 = arc.x + Math.cos(centerAngle) * innerR;
          var y1 = arc.y + Math.sin(centerAngle) * innerR;
          var x2 = arc.x + Math.cos(centerAngle) * outerR;
          var y2 = arc.y + Math.sin(centerAngle) * outerR;
          var xL = arc.x + Math.cos(centerAngle) * labelR;
          var yL = arc.y + Math.sin(centerAngle) * labelR;

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = chart.data.datasets[0].backgroundColor[i];
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.font = '14px "Material Icons Round"';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = chart.data.datasets[0].backgroundColor[i];
          ctx.fillText(iconChar, xL, yL);
        }
      });
      ctx.restore();
    }
  };

  donutChartInstance = new Chart(donutCtx, {
    type: 'pie',
    data: {
      labels: donutLabels,
      datasets: [{
        data: donutData,
        backgroundColor: donutColors,
        borderWidth: 0
      }]
    },
    plugins: [pieIconPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: 0,
      layout: { padding: 10 },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, color: textColor } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var val = ctx.parsed;
              var pct = grandTotal > 0 ? Math.round(val / grandTotal * 100) : 0;
              return ctx.label + ': $' + formatNum(val) + ' (' + pct + '%)';
            }
          }
        }
      }
    }
  });
}

// ===== Bar Tooltip =====
function showBarTip(evt, idx, type) {
  var existing = document.getElementById('barTip');
  if (existing) existing.remove();
  var data = type === 'trip' ? window._tripExpData[idx] : window._dailyExpData[idx];
  if (!data || !data.length) return;
  var tip = document.createElement('div');
  tip.id = 'barTip';
  tip.className = 'bar-tip';
  var html = '';
  data.forEach(function(d) {
    html += '<div class="bar-tip-row"><span class="material-icons-round" style="font-size:14px;color:' + d.color + '">' + d.icon + '</span><span>' + d.val + '</span></div>';
  });
  tip.innerHTML = html;
  document.body.appendChild(tip);
  var rect = evt.currentTarget.getBoundingClientRect();
  tip.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  tip.style.left = (rect.left + rect.width / 2) + 'px';
  setTimeout(function() { if (tip.parentNode) tip.remove(); }, 3000);
  document.addEventListener('click', function dismiss(e) {
    if (e.target !== evt.currentTarget && !evt.currentTarget.contains(e.target)) {
      if (tip.parentNode) tip.remove();
      document.removeEventListener('click', dismiss);
    }
  });
}
</script>

<script>

        var nextDay = parseAnyDate(f.date, tripYear);

  if (isOwner) ahtml += '<span class="material-icons-round section-title-add owner-only" onclick="openDayPlanForm()">add</span>';

      if (distStr) ahtml += '<span class="dayplan-dist">' + distStr + '</span>';

  {

    var expMaxCat = Math.max.apply(null, expCatKeys.map(function(c) { return cats[c]; })) || 1;
    ehtml += '<div class="card card-padded">';
    expCatKeys.forEach(function(cat) {
      var icon = catIcons[cat] || 'label';
      var catCol = catColors[cat] || '#94A3B8';

function saveTripEdit() {
  var t = currentTrip;
  var oldName = t.trip;
  var name = document.getElementById('tripEditName').value;
  var start = document.getElementById('tripEditStart').value;
  var end = document.getElementById('tripEditEnd').value;
  var cur = document.getElementById('tripEditCur').value;
  var rate = document.getElementById('tripEditRate').value;
  var flag = document.getElementById('tripEditFlag').value;
  var map = document.getElementById('tripEditMap').value;
  if (!name.trim()) { warnToast('Trip name required'); return; }
  if (start && end && end < start) { warnToast('End date must be after start'); return; }

  setFormSaving(true);
  startSync();
  var nameChanged = name !== oldName;
  t.trip = name; t.start = start; t.end = end; t.currency = cur; t.exchangeRate = rate; t.flag = flag; t.map = map;
  selectedTrip = name;
  saveSelectedTrip(name);
  closeFormModal();
  renderApp();
  showToast(nameChanged ? 'Renaming trip...' : 'Trip updated', 'success');

  if (nameChanged) {
    // Rename across all sheets, then update trip row
    google.script.run
      .withSuccessHandler(function() {
        google.script.run
          .withSuccessHandler(function() { endSync(true); refreshData(); crudToast('renamed', 'Trip'); })
          .withFailureHandler(function(err) { endSync(false); failToast(err); refreshData(); })
          .editTrip(t.row, name, start, end, flag, cur, rate, t.visible, map);
      })
      .withFailureHandler(function(err) { endSync(false); failToast(null, 'rename'); refreshData(); })
      .renameTrip(oldName, name);
  } else {
    google.script.run
      .withSuccessHandler(function() { endSync(true); })
      .withFailureHandler(function(err) { endSync(false); failToast(err); refreshData(); })
      .editTrip(t.row, name, start, end, flag, cur, rate, t.visible, map);
  }
}

// ===== Add Trip Form =====
function openAddTripForm() {
  // Pre-fill from most recent trip (by start date)
  var recent = appData.trips.slice().sort(function(a, b) { return (b.start || '').localeCompare(a.start || ''); })[0];
  var defCur = recent ? recent.currency || '' : '';
  var defRate = recent ? recent.exchangeRate || '' : '';
  var defFlag = recent ? recent.flag || '' : '';

  var h = '';
  h += fld('flight_takeoff', 'newTripName', '', '', 'Trip Name*');
  h += '<div class="form-row">';
  h += fld('event', 'newTripStart', 'date', '', 'Start*', ' onchange="document.getElementById(\'newTripEnd\').min=this.value"');
  h += fld('event', 'newTripEnd', 'date', '', 'End*');
  h += '</div>';
  h += '<div class="form-row">';
  h += '<div class="form-group" style="flex:1;"><div class="form-input-prefix" onclick="openCurrencyPicker(function(v){document.getElementById(\'newTripCur\').value=v;});" style="cursor:pointer;">';

function dpConvertCost(from) {
  var rate = parseFloat(currentTrip.exchangeRate);
  if (!rate) return;
  if (from === 'local') {
    var other = document.getElementById('dpHK');
    if (other.value.trim()) return;
    var local = parseFloat(document.getElementById('dpCost').value);
    if (!isNaN(local) && local > 0) other.value = Math.round(local * rate * 100) / 100;
  } else {
    var other = document.getElementById('dpCost');
    if (other.value.trim()) return;
    var hk = parseFloat(document.getElementById('dpHK').value);
    if (!isNaN(hk) && hk > 0 && rate > 0) other.value = Math.round(hk / rate * 100) / 100;
  }
}

// ===== Trip Modal =====
function openTripModal() {
  var html = '';
  var sortedTrips = appData.trips.slice().sort(function(a, b) {
    return (b.start || '').localeCompare(a.start || '');
  });
  sortedTrips.forEach(function(t) {
    var sel = t.trip === selectedTrip ? ' selected' : '';
    var days = daysBetween(t.start, t.end);
    var check = t.trip === selectedTrip ? '<span class="material-icons-round">check</span>' : '';
    var cur = (t.currency || '').slice(-1);
    var plans = appData.plans.filter(function(p) { return p.trip === t.trip; });
    var dist = 0, hotel = 0;
    plans.forEach(function(p) {
      if (p.distance) dist += parseFloat(p.distance) || 0;
      hotel += parseCost(p.localCost);
    });
    var meta = formatDateShort(t.start) + ' - ' + formatDateShort(t.end) + ' \u00B7 ' + days + 'd';
    if (dist > 0) meta += ' \u00B7 ' + Math.round(dist) + 'km';
    if (t.exchangeRate) meta += ' \u00B7 ' + t.exchangeRate;

    html += '<div class="trip-modal-item' + sel + '" onclick="selectTrip(\'' + escAttr(t.trip) + '\')">';
    var tFlag = t.flag;
    if (tFlag) html += '<img class="trip-modal-item-flag" src="' + escAttr(tFlag) + '" alt="">';
    html += '<div class="trip-modal-item-info">';
    html += '<div class="trip-modal-item-name">' + esc(t.trip) + '</div>';
    html += '<div class="trip-modal-item-dates">' + meta + '</div>';
    html += '</div>';
    html += check;
    html += '</div>';
  });
  document.getElementById('tripModalList').innerHTML = html;
  document.getElementById('tripModal').classList.add('active');
  history.pushState({ tripModalOpen: true }, '');
}

function closeTripModal() {
  document.getElementById('tripModal').classList.remove('active');
  if (history.state && history.state.tripModalOpen) history.back();
}

function selectTrip(tripName) {
  selectedTrip = tripName;
  saveSelectedTrip(tripName);
  closeTripModal();
  renderApp();
  scrollToTop();
}

<script>
// ===== Itinerary Tab =====
function renderItineraryTab() {

  var tripItinerary = appData.itinerary.filter(function(it) { return it.trip === selectedTrip; });
  // Normalize dates for comparison using shortDate (M/D)
  function normDate(d) { return shortDate(d); }
  var planDateNorms = currentPlans.map(function(p) { return normDate(p.date); });
  var orphanItems = tripItinerary.filter(function(it) { return planDateNorms.indexOf(normDate(it.date)) === -1; });

  function dateNum(d) { var s = shortDate(d); var p = s.split('/'); return parseInt(('0' + p[0]).slice(-2) + ('0' + (p[1]||0)).slice(-2)); }
  var firstPlanNum = currentPlans.length > 0 ? dateNum(currentPlans[0].date) : 9999;

  var dayItems = [];
  currentPlans.forEach(function(plan) {
    var planNorm = normDate(plan.date);
    var items = tripItinerary.filter(function(it) { return normDate(it.date) === planNorm; });
    items.sort(function(a, b) {
      var at = formatTime(a.start) || '99:99';
      var bt = formatTime(b.start) || '99:99';
      return at.localeCompare(bt);
    });
    dayItems.push({ plan: plan, items: items });
  });

  orphanItems.forEach(function(it) {
    if (dayItems.length === 0) return;
    if (dateNum(it.date) < firstPlanNum) {
      dayItems[0].items.push(it);
    } else {
      dayItems[dayItems.length - 1].items.push(it);
    }
  });

  dayItems.forEach(function(d) {
    d.items.sort(function(a, b) {
      var adn = dateNum(a.date), bdn = dateNum(b.date);
      if (adn !== bdn) return adn - bdn;
      var am = timeToMin(a.start), bm = timeToMin(b.start);
      return am - bm;
    });
  });

  // Day nav + add button
  var navHtml = '';
  _itinTodayIdx = -1;
  var now = nowTime();
  dayItems.forEach(function(d, i) {
    var sd = shortDate(d.plan.date);
    var todayCls = isToday(d.plan.date) ? ' is-today' : '';
    if (isToday(d.plan.date)) _itinTodayIdx = i;
    navHtml += '<button class="sub-nav-item' + todayCls + '" onclick="scrollToDay(' + i + ')" id="dayNavBtn' + i + '">' + sd + '</button>';
  });
  document.getElementById('dayNav').innerHTML = navHtml;

  // Render days
  var html = '';
  dayItems.forEach(function(day, idx) {
    var plan = day.plan;
    var items = day.items;
    var dayIsToday = isToday(plan.date);
    var dayIsPast = !dayIsToday && displayDateToISO(plan.date, currentTrip.start) < todayISO();
    var foundNow = false;

    html += '<div class="card day-section' + (dayIsToday ? ' is-today' : '') + '" id="day' + idx + '">';
    html += '<div class="day-section-header" onclick="toggleAttractions(' + idx + ')">';
    html += '<div class="day-section-row1">';
    html += '<span class="day-section-date">' + esc(displayDate(plan.date)) + '</span>';
    if (plan.itinerary) html += '<span class="day-section-itin">' + esc(plan.itinerary) + '</span>';
    if (plan.distance) html += '<span class="plan-distance-right">' + esc(plan.distance) + 'km' + (plan.ascent ? ' ↑' + esc(plan.ascent) : '') + '</span>';
    html += '</div>';
    if (plan.accommodation) {
      html += '<div class="day-section-row2">';

      var cls = 'timeline-row' + (isImp ? ' important' : '') + nowCls;

        html += '<button class="swipe-btn swipe-btn-delete" onclick="confirmDeleteItin(' + it.row + ')"><span class="material-icons-round">delete</span></button>';
        html += '</div>';
        html += '<div class="swipe-content">';
      }

      html += '<div class="' + cls + '">';
      var timeStr = formatTime(it.start);
      if (it.end) timeStr += '-' + formatTime(it.end);
      var dateBadge = '';
      html += '<div class="timeline-event-row">';
      html += '<span class="timeline-time">' + timeStr + dateBadge + '</span>';
      html += '<span class="timeline-event">' + esc(it.event || '-') + '</span>';
      if (hasCost) html += '<span class="timeline-cost">' + costVal + '</span>';
      html += '</div>';
      if (it.detail || hasLink) {
        html += '<div class="timeline-detail-row">';
        html += '<span class="timeline-detail">' + (it.detail ? esc(it.detail) : '') + '</span>';
        if (hasLink) html += '<a class="timeline-link-btn" href="' + escAttr(it.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation();"><span class="material-icons-round">link</span></a>';
        html += '</div>';
      }
      html += '</div>';

      if (isOwner) {
        html += '</div></div>'; // close swipe-content + swipe-container
      }
    });

    if (items.length === 0 && !plan.itinerary) {
      html += '<div class="empty-state">No itinerary yet</div>';
    }
    html += '</div>';
  });

  document.getElementById('daysContent').innerHTML = html;
  if (dayItems.length > 0) highlightDayNav(0);

  // Init swipe on rendered rows
  if (isOwner) {
    var container = document.getElementById('daysContent');
    if (container) initSwipeRows(container);
  }

  // Auto-scroll to today when tab is shown
  if (_itinTodayIdx >= 0) {
    setTimeout(function() { scrollToDay(_itinTodayIdx); }, 300);
  }
}

  h += fld('schedule', 'itinEnd', 'time', data ? formatTime(data.end) : '', 'To*', ' onchange="autoItinDuration()"');
  var initDur = (data && data.start && data.end) ? calcDuration(formatTime(data.start), formatTime(data.end)) : '';
  h += fld('timer', 'itinDur', '', initDur, 'Dur.');
  h += '</div>';
  h += fld('edit_note', 'itinEvent', '', data ? data.event : '', 'Event*');
  h += fld('notes', 'itinDetail', '', data ? data.detail : '', 'Detail', ' style="min-height:56px"');
  h += '<div class="form-row">';

  var hasItinHK = data && data.hkCost && parseCost(data.hkCost);
  h += fld(currency, 'itinLocal', '', hasItinLocal || '', 'Local', ' inputmode="decimal" oninput="cleanCostInput(this)" onchange="itinConvertCost(\'local\')"');
  h += fld('$', 'itinHK', '', hasItinHK || '', 'HKD', ' inputmode="decimal" oninput="cleanCostInput(this)" onchange="itinConvertCost(\'hk\')"');
  h += '<div class="form-group" style="flex:0;align-self:center;"><label class="form-toggle' + (data && data.important ? ' active' : '') + '" id="itinImpToggle" onclick="this.classList.toggle(\'active\')">';
  h += '<span class="material-icons-round">' + (data && data.important ? 'star' : 'star_outline') + '</span></label></div>';
  h += '</div>';
  if (currentTrip.exchangeRate) {
    h += '<div class="form-rate">' + currency + '1 = $' + parseFloat(currentTrip.exchangeRate) + '</div>';
  }
  h += fld('link', 'itinUrl', '', data ? data.url || '' : '', 'URL');
  return h;
}

function itinConvertCost(from) {
  var rate = parseFloat(currentTrip.exchangeRate);
  if (!rate) return;
  if (from === 'local') {
    var other = document.getElementById('itinHK');
    if (other.value.trim()) return;
    var local = parseFloat(document.getElementById('itinLocal').value);
    if (!isNaN(local) && local > 0) {
      other.value = Math.round(local * rate * 100) / 100;
    }
  } else {
    var other = document.getElementById('itinLocal');
    if (other.value.trim()) return;
    var hk = parseFloat(document.getElementById('itinHK').value);
    if (!isNaN(hk) && hk > 0 && rate > 0) {
      other.value = Math.round(hk / rate * 100) / 100;
    }
  }
}

function autoItinDuration() {
  var s = document.getElementById('itinStart').value;
  var e = document.getElementById('itinEnd').value;
  var dur = calcDuration(s, e);
  var el = document.getElementById('itinDur');
  if (el) el.value = dur;
}

function calcDuration(start, end) {
  if (!start || !end) return '';
  var sp = start.split(':'), ep = end.split(':');
  if (sp.length < 2 || ep.length < 2) return '';
  var sm = parseInt(sp[0]) * 60 + parseInt(sp[1]);
  var em = parseInt(ep[0]) * 60 + parseInt(ep[1]);
  if (em <= sm) em += 24 * 60; // next day
  var diff = em - sm;
  var h = Math.floor(diff / 60), m = diff % 60;
  return h + ':' + ('0' + m).slice(-2);
}

function saveNewItin() {
  var v = _getItinFormValues();
  if (!v.date) { warnToast('Date is required'); return; }
  if (!v.start) { warnToast('Start time is required'); return; }
  if (!v.end) { warnToast('End time is required'); return; }
  if (!v.event.trim()) { warnToast('Event name required'); return; }
  var duration = calcDuration(v.start, v.end);

  setFormSaving(true); startSync();
  appData.itinerary.push({
    row: -1, trip: selectedTrip, date: v.date, start: v.start, end: v.end,
    duration: duration, event: v.event, detail: v.detail,
    localCost: v.localCost, hkCost: v.hkCost, url: v.url, important: v.important
  });
  closeFormModal();
  renderItineraryTab();
  crudToast('added', 'Event');

  google.script.run
    .withSuccessHandler(function() { endSync(true); })
    .withFailureHandler(function(err) { endSync(false); failToast(err); refreshData(); })
    .addItinerary(selectedTrip, v.date, v.start, v.end, duration, v.event, v.detail, v.localCost, v.hkCost, v.url, v.important);
}

function saveEditItin(sheetRow) {
  if (!sheetRow || sheetRow < 1) { warnToast('Please refresh and try again'); return; }
  var v = _getItinFormValues();
  if (!v.date) { warnToast('Date is required'); return; }
  if (!v.start) { warnToast('Start time is required'); return; }
  if (!v.end) { warnToast('End time is required'); return; }
  if (!v.event.trim()) { warnToast('Event name required'); return; }
  var duration = calcDuration(v.start, v.end);

  setFormSaving(true); startSync();
  var it = appData.itinerary.find(function(x) { return x.row === sheetRow; });
  if (it) {
    it.date = v.date; it.start = v.start; it.end = v.end;
    it.event = v.event; it.detail = v.detail;
    it.localCost = v.localCost; it.hkCost = v.hkCost;
    it.url = v.url; it.important = v.important;
  }
  closeFormModal();
  renderItineraryTab();
  crudToast('updated', 'Event');

  google.script.run
    .withSuccessHandler(function() { endSync(true); })
    .withFailureHandler(function(err) { endSync(false); failToast(err); refreshData(); })
    .editItinerary(sheetRow, v.date, v.start, v.end, duration, v.event, v.detail, v.localCost, v.hkCost, v.url, v.important);
}

function toggleItinImportant(sheetRow) {
  resetAllSwipes();
  var it = appData.itinerary.find(function(x) { return x.row === sheetRow; });
  if (!it) return;
  var wasImp = it.important && it.important.toString().trim();
  it.important = wasImp ? '' : '!';
  renderItineraryTab();
  startSync();
  google.script.run
    .withSuccessHandler(function() { endSync(true); })
    .withFailureHandler(function(err) { endSync(false); failToast(); it.important = wasImp ? '!' : ''; renderItineraryTab(); })
    .editItinerary(sheetRow, it.date, it.start, it.end, it.duration || '', it.event, it.detail, it.localCost, it.hkCost, it.url, it.important);
}

function confirmDeleteItin(sheetRow) {

function scrollToExpCat(idx) {
  var el = document.getElementById('expCatCard' + idx);
  if (!el) return;
  try {
    var rect = el.getBoundingClientRect();
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
    var top = rect.top + scrollTop - 64;
    window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  } catch(e) { el.scrollIntoView(true); }
}

  }

  var items = appData.checklist || [];
  var packed = items.filter(function(c) { return c.checked; }).length;

  var checkBadge = document.getElementById('checklistBadge');
  if (checkBadge) checkBadge.textContent = packed;

  var groups = {};
  items.forEach(function(c) {
    if (!groups[c.category]) groups[c.category] = [];
    groups[c.category].push(c);
  });

  var catKeys = Object.keys(groups).sort();
  var html = '';
  catKeys.forEach(function(cat) {
    var catItems = groups[cat];
    var catChecked = catItems.filter(function(c) { return c.checked; }).length;
    var catLabel = cat.replace(/^\d+\s*/, '');

    html += '<div class="card">';
    html += '<div class="group-header">';
    html += '<span class="group-header-name">' + esc(catLabel) + '</span>';
    html += '<span class="group-header-meta">' + catChecked + '/' + catItems.length + '</span>';
    html += '</div>';

    var sorted = catItems.slice().sort(function(a, b) { return (b.checked ? 1 : 0) - (a.checked ? 1 : 0); });
    sorted.forEach(function(c, i) {
      if (i > 0) html += '<div class="divider"></div>';
      var impClass = 'imp' + c.importance;
      var checkedClass = c.checked ? ' checked' : '';
      var impHighlight = c.importance === 1 ? ' check-critical' : (c.importance === 2 ? ' check-warn' : '');

      html += '<div class="swipe-container">';
      html += '<div class="swipe-actions">';
      html += '<button class="swipe-btn swipe-btn-edit" onclick="openCheckEditForm(' + c.row + ')"><span class="material-icons-round">edit</span></button>';
      html += '<button class="swipe-btn swipe-btn-delete" onclick="confirmDeleteCheck(' + c.row + ')"><span class="material-icons-round">delete</span></button>';
      html += '</div>';
      html += '<div class="swipe-content">';

      html += '<div class="check-row' + checkedClass + impHighlight + '">';
      html += '<span class="check-box" onclick="toggleCheckItem(' + c.row + ',' + !c.checked + ')">';
      html += '<span class="material-icons-round">' + (c.checked ? 'check_box' : 'check_box_outline_blank') + '</span>';
      html += '</span>';
      html += '<span class="check-item-name">' + esc(c.item) + '</span>';
      if (c.remarks) html += '<span class="check-remarks">' + esc(c.remarks) + '</span>';
      if (c.amount && c.amount.toString().trim()) html += '<span class="check-amount">\u00D7' + esc(c.amount) + '</span>';
      html += '<span class="check-imp ' + impClass + '" onclick="cycleImportance(' + c.row + ',' + c.importance + ')"></span>';
      html += '</div>';

      html += '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('checkList').innerHTML = html;
  initSwipeRows(document.getElementById('checkList'));
}

function toggleCheckItem(sheetRow, value) {
  var item = appData.checklist.find(function(c) { return c.row === sheetRow; });
  if (item) { item.checked = value; renderChecklistTab(); }
  startSync();
  google.script.run
    .withSuccessHandler(function() { endSync(true); })
    .withFailureHandler(function(err) {
      endSync(false);
      failToast();
      if (item) { item.checked = !value; renderChecklistTab(); }
    })
    .toggleCheck(sheetRow, value);
}

function cycleImportance(sheetRow, current) {
  var next = (current % 3) + 1;
  var item = appData.checklist.find(function(c) { return c.row === sheetRow; });
  if (item) { item.importance = next; renderChecklistTab(); }
  startSync();
  google.script.run
    .withSuccessHandler(function() { endSync(true); })
    .withFailureHandler(function(err) {
      endSync(false);
      failToast();
      if (item) { item.importance = current; renderChecklistTab(); }
    })
    .setImportance(sheetRow, next);
}

// ===== Checklist Form =====
function _getCheckCategories() {
  var cats = {};
  (appData.checklist || []).forEach(function(c) { cats[c.category] = true; });
  return Object.keys(cats).sort();
}

function _buildCheckFormHtml(data) {
  var cats = _getCheckCategories();
  var catOptions = cats.map(function(c) {
    var label = c.replace(/^\d+\s*/, '');
    var sel = (data && data.category === c) ? ' selected' : '';
    return '<option value="' + escAttr(c) + '"' + sel + '>' + esc(label) + '</option>';
  }).join('');

  var h = '';
  h += '<div class="form-row">';
  h += fld('category', 'checkCat', 'select', catOptions);
  h += '<div style="flex:0.5;">' + fld('tag', 'checkAmt', '', data ? data.amount || '' : '', 'Qty') + '</div>';
  h += '</div>';
  h += fld('label', 'checkItem', '', data ? data.item : '', 'Item*');
  h += fld('sticky_note_2', 'checkRemarks', '', data ? data.remarks || '' : '', 'Remarks');
  return h;
}

function openCheckForm() {

function openCheckEditForm(sheetRow) {

  var amt = document.getElementById('checkAmt').value;

function saveEditCheck(sheetRow) {

  var amt = document.getElementById('checkAmt').value;

function confirmDeleteCheck(sheetRow) {

    google.script.run
      .withSuccessHandler(function() { endSync(true); })

}
</script>

<script>
// ===== Postcard Tab =====
function renderPostcardTab() {
  var settings = (appData && appData.settings) || {};
  var priv = (settings['app.private'] || '').split(',').filter(Boolean);
  if (!isOwner && priv.indexOf('postcard') >= 0) {
    document.getElementById('postcardList').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><span class="material-icons-round" style="font-size:48px;display:block;margin-bottom:12px;">lock</span>Private Zone</div>';
    var pb = document.getElementById('postcardBadge'); if (pb) pb.textContent = '0';

  }
  var items = appData.postcards || [];
  var sending = items.filter(function(p) { return p.send; });
  var notSending = items.filter(function(p) { return !p.send; });

  var postcardBadge = document.getElementById('postcardBadge');
  if (postcardBadge) postcardBadge.textContent = sending.length;

  var html = '';

  function renderPostcardGroup(list, label, isSending) {
    if (list.length === 0) return;
    html += '<div class="card">';
    html += '<div class="group-header' + (isSending ? '' : ' group-header-dim') + '"><span class="group-header-name">' + label + '</span><span class="group-header-meta">' + list.length + '</span></div>';
    list.forEach(function(p, i) {
      if (i > 0) html += '<div class="divider"></div>';

      html += '<div class="swipe-container">';
      html += '<div class="swipe-actions">';
      html += '<button class="swipe-btn swipe-btn-edit" onclick="openPostcardEditForm(' + p.row + ')"><span class="material-icons-round">edit</span></button>';
      html += '<button class="swipe-btn swipe-btn-delete" onclick="confirmDeletePostcard(' + p.row + ')"><span class="material-icons-round">delete</span></button>';
      html += '</div>';
      html += '<div class="swipe-content">';

      html += '<div class="postcard-row' + (isSending ? ' selected' : '') + '">';
      html += '<span class="check-box" onclick="togglePostcardItem(' + p.row + ',' + !p.send + ')"><span class="material-icons-round">' + (p.send ? 'check_box' : 'check_box_outline_blank') + '</span></span>';
      html += '<div class="postcard-info">';
      html += '<span class="postcard-name">' + esc(p.name) + '</span>';
      if (isSending && p.address) html += '<span class="postcard-address">' + esc(p.address) + '</span>';
      html += '</div>';
      if (isSending && p.address) html += '<span class="postcard-copy" onclick="copyAddress(\'' + escAttr(p.address) + '\')"><span class="material-icons-round">content_copy</span></span>';
      html += '</div>';

      html += '</div></div>';

  document.getElementById('postcardList').innerHTML = html;
