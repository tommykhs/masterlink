<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline PWA Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #121212; color: #fff;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 24px;
      text-align: center;
    }
    .icon { width: 80px; height: 80px; margin-bottom: 20px; border-radius: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #999; font-size: 14px; margin-bottom: 24px; max-width: 300px; }
    .status {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 24px; font-size: 16px; font-weight: 600;
    }
    .online { background: rgba(5, 150, 105, 0.2); color: #34D399; }
    .offline { background: rgba(239, 68, 68, 0.2); color: #F87171; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .online .dot { background: #34D399; }
    .offline .dot { background: #F87171; }
    .info { margin-top: 32px; font-size: 12px; color: #666; }
    .info span { display: block; margin-top: 4px; }
    .card {
      background: #1E1E1E; border-radius: 12px; padding: 20px;
      margin-top: 24px; width: 100%; max-width: 320px;
    }
    .card h3 { font-size: 14px; color: #999; margin-bottom: 12px; }
    .card-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #333;
      font-size: 14px;
    }
    .card-item:last-child { border-bottom: none; }
    .card-item .label { color: #ccc; }
    .card-item .value { color: #0891B2; font-weight: 600; }
  </style>
</head>
<body>
  <img class="icon" src="https://cdn-icons-png.flaticon.com/512/5219/5219577.png" alt="icon">
  <h1>Offline PWA Test</h1>
  <p>If you can see this page without internet, offline caching works!</p>

  <div class="status" id="status">
    <span class="dot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="card">
    <h3>Cached Content</h3>
    <div class="card-item">
      <span class="label">Tokyo</span>
      <span class="value">¥52,652</span>
    </div>
    <div class="card-item">
      <span class="label">Osaka</span>
      <span class="value">¥38,200</span>
    </div>
    <div class="card-item">
      <span class="label">London</span>
      <span class="value">£2,045</span>
    </div>
  </div>

  <div class="info">
    <span id="loadTime"></span>
    <span id="swStatus"></span>
    <span id="cacheStatus"></span>
  </div>

  <script>
    function updateStatus() {
      var el = document.getElementById('status');
      var text = document.getElementById('statusText');
      if (navigator.onLine) {
        el.className = 'status online';
        text.textContent = 'Online';
      } else {
        el.className = 'status offline';
        text.textContent = 'Offline — served from cache!';
      }
    }
    updateStatus();
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    document.getElementById('loadTime').textContent = 'Page loaded: ' + new Date().toLocaleString();

    // Check SW status
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function(reg) {
        document.getElementById('swStatus').textContent = reg ? 'Service Worker: active' : 'Service Worker: not registered';
      });
      caches.keys().then(function(names) {
        document.getElementById('cacheStatus').textContent = 'Caches: ' + (names.length ? names.join(', ') : 'none');
      });
    } else {
      document.getElementById('swStatus').textContent = 'Service Worker: not supported';
    }
  </script>
</body>
</html>
