name: Deploy to SiteGround

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: gsgp1014.siteground.asia
          username: go@mcai.dev
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /go.mcai.dev/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            DEPLOY-INFINITYFREE.md
            DEVELOPMENT.md
            README.md
            docs/**
            database/**
