name: Deploy to InfinityFree

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: if0_41390850
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            DEPLOY-INFINITYFREE.md
            DEVELOPMENT.md
            README.md
            docs/**
            database/**

      - name: Run migrations
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://ts.page.gd/migrate.php?key=mk_ad3f313587bcb7a98503b1e4eaea4c5e")
          echo "Migration response: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: Migration endpoint returned $response"
          fi
